services:
  - type: web
    name: autofiche-server
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SHOPIFY_TOKEN
        sync: false
      - key: SHOPIFY_STORE
        sync: false
